<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lecciones · Tu Tutor de Español Tapatío</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Playfair+Display:wght@700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cobalt:#1B4F8A;--cobalt-dk:#143a66;--terracotta:#C1440E;--marigold:#E8971A;
  --cream:#F5F0E8;--jade:#2A7A3B;--muted:#6B7280;--text:#22223B;--bg:#F5F0E8;--tapatio:#7C3AED;
  --card:#FFFFFF;--line:#E6DCCB;
  --lv1:#D98C5F;--lv2:#E8971A;--lv3:#5B9BD5;--lv4:#3E7CB1;--lv5:#2A7A3B;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',system-ui,sans-serif;color:var(--text);min-height:100vh;font-size:17px;line-height:1.55;
  background:
   radial-gradient(circle at 8% 0%, rgba(232,151,26,.13), transparent 40%),
   radial-gradient(circle at 92% 100%, rgba(27,79,138,.13), transparent 45%),
   var(--bg);}
.wrap{max-width:900px;margin:0 auto;padding:34px 20px 70px}
a{color:inherit}
/* header */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.back{font-family:'Oswald',sans-serif;font-weight:600;font-size:.88rem;letter-spacing:.02em;color:var(--cobalt-dk);
  text-decoration:none;display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);
  border-radius:20px;padding:8px 14px}
.back:hover{border-color:var(--marigold)}
.hero{text-align:center;margin-bottom:24px}
.hero .kicker{font-family:'Barlow',sans-serif;font-weight:600;letter-spacing:.04em;color:var(--terracotta);font-size:1rem}
.hero h1{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--cobalt);line-height:1.1;margin:6px 0 6px}
.hero .sub{color:var(--muted);font-size:1.02rem;max-width:560px;margin:0 auto}
/* picker grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:18px}
.lesson-card{display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);
  border-radius:18px;padding:20px;text-decoration:none;color:inherit;position:relative;overflow:hidden;cursor:pointer;
  box-shadow:0 8px 20px rgba(27,79,138,.06);transition:transform .16s,box-shadow .16s,border-color .16s}
.lesson-card:hover{transform:translateY(-4px);box-shadow:0 14px 30px rgba(27,79,138,.14);border-color:var(--marigold)}
.lesson-card .accent{position:absolute;top:0;left:0;right:0;height:5px}
.lesson-card .emoji{font-size:2.3rem;line-height:1}
.lesson-card h3{font-family:'Oswald',sans-serif;font-weight:600;font-size:1.18rem;color:var(--cobalt-dk);margin:11px 0 4px}
.lesson-card p{color:var(--muted);font-size:.92rem;flex:1}
.lesson-card .go{margin-top:13px;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;
  letter-spacing:.04em;font-size:.82rem;color:var(--terracotta);display:flex;align-items:center;gap:6px}
.mastery-chip{margin-top:12px;display:inline-flex;align-items:center;gap:6px;background:#FBF7EF;border:1px solid var(--line);
  border-radius:20px;padding:5px 11px;font-size:.82rem;font-weight:600;color:var(--cobalt-dk);align-self:flex-start}
.empty-state{color:var(--muted);text-align:center;padding:40px 10px}
/* detail view */
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px 24px;
  box-shadow:0 10px 26px rgba(27,79,138,.07);margin-bottom:18px}
.card h2{font-family:'Oswald',sans-serif;font-weight:600;font-size:1.05rem;color:var(--cobalt-dk);
  letter-spacing:.02em;margin-bottom:10px;display:flex;align-items:center;gap:9px;text-transform:uppercase}
.lesson-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:6px}
.lesson-head .emoji{font-size:2.6rem;line-height:1}
.lesson-head h1{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--cobalt);line-height:1.15}
.lesson-head .summary{color:var(--muted);font-size:.98rem;margin-top:4px}
.note-box{background:#FBF7EF;border:1px solid var(--line);border-left:4px solid var(--terracotta);border-radius:10px;
  padding:12px 14px;font-size:.92rem;color:var(--text);margin-bottom:6px}
.dialogue{display:flex;flex-direction:column;gap:10px}
.line{display:flex;flex-direction:column;max-width:80%;border-radius:14px;padding:10px 14px}
.line.them{align-self:flex-start;background:#EEF4FB;border:1px solid #D8E6F7}
.line.me{align-self:flex-end;background:#FBF1E2;border:1px solid #F2DEBC;text-align:right}
.line .who{font-family:'Oswald',sans-serif;font-weight:600;font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.line .es{font-size:1rem}
.line .en{font-size:.84rem;color:var(--muted);margin-top:3px;font-style:italic}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:#FBF7EF;border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:.86rem}
.chip b{color:var(--cobalt-dk)}
.chip .en{color:var(--muted)}
.gram-card{background:#F8F4FE;border:1px solid #E2D2FB;border-radius:14px;padding:13px 15px;margin-bottom:10px}
.gram-card .sec{font-family:'Oswald',sans-serif;font-weight:700;font-size:.85rem;color:var(--tapatio);margin-bottom:3px}
.gram-card p{font-size:.92rem;color:var(--text)}
.practice-list{display:flex;flex-direction:column;gap:10px}
.practice-item{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  background:#FBF7EF;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.practice-item .txt{flex:1;min-width:200px}
.practice-item .txt b{font-family:'Oswald',sans-serif;font-weight:600;font-size:.92rem;color:var(--cobalt-dk)}
.practice-item .txt small{display:block;color:var(--muted);font-size:.85rem;margin-top:2px}
.btn-go{border:none;border-radius:12px;padding:9px 16px;font-family:'Oswald',sans-serif;font-weight:600;
  font-size:.85rem;letter-spacing:.02em;cursor:pointer;background:var(--cobalt);color:#fff;text-decoration:none;flex:0 0 auto}
.btn-go:hover{background:var(--cobalt-dk)}
/* ── mode toggle + participar ── */
.mode-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.mode-btn{border:2px solid var(--line);background:#fff;border-radius:20px;padding:7px 16px;cursor:pointer;
  font-family:'Oswald',sans-serif;font-weight:600;font-size:.85rem;color:var(--cobalt-dk);transition:.14s}
.mode-btn:hover{border-color:var(--marigold)}
.mode-btn.active{background:var(--cobalt);border-color:var(--cobalt);color:#fff}
.mode-hint{font-size:.85rem;color:var(--muted);margin-bottom:12px}
.choice-block{align-self:flex-end;max-width:88%;display:flex;flex-direction:column;gap:8px;width:100%;align-items:flex-end}
.choice-title{font-family:'Oswald',sans-serif;font-weight:600;font-size:.8rem;letter-spacing:.04em;
  text-transform:uppercase;color:var(--terracotta)}
.choice-btn{text-align:right;background:#fff;border:2px solid var(--marigold);border-radius:14px;padding:10px 14px;
  cursor:pointer;font-family:'Barlow',sans-serif;font-size:.98rem;color:var(--text);max-width:100%;transition:.14s}
.choice-btn:hover{background:#FBF1E2;transform:translateY(-1px)}
.choice-btn .en{display:block;font-size:.82rem;color:var(--muted);font-style:italic;margin-top:2px}
.choice-note{align-self:flex-end;max-width:80%;background:#F8F4FE;border:1px solid #E2D2FB;border-radius:12px;
  padding:9px 13px;font-size:.86rem;color:var(--text);text-align:right}
.rechoose{align-self:flex-end;background:none;border:none;color:var(--muted);font-size:.8rem;cursor:pointer;
  text-decoration:underline;font-family:'Barlow',sans-serif;padding:2px}
.turn-block{align-self:flex-end;max-width:92%;width:100%;display:flex;flex-direction:column;align-items:flex-end;gap:8px;
  background:#FFFBF3;border:1.5px dashed var(--marigold);border-radius:14px;padding:14px}
.turn-cue{font-size:.9rem;color:var(--muted);font-style:italic;text-align:right}
.turn-cue b{color:var(--terracotta);font-style:normal}
.turn-input-row{display:flex;gap:8px;width:100%;justify-content:flex-end;flex-wrap:wrap}
.turn-input{flex:1;min-width:200px;border:2px solid var(--line);border-radius:12px;padding:10px 13px;
  font-family:'Barlow',sans-serif;font-size:1rem;background:#fff;color:var(--text)}
.turn-input:focus{outline:none;border-color:var(--cobalt)}
.btn-check{border:none;border-radius:12px;padding:10px 18px;font-family:'Oswald',sans-serif;font-weight:600;
  font-size:.88rem;cursor:pointer;background:var(--terracotta);color:#fff}
.btn-check:hover{filter:brightness(1.08)}
.btn-ghost{border:1px solid var(--line);border-radius:12px;padding:9px 14px;font-family:'Oswald',sans-serif;
  font-weight:600;font-size:.82rem;cursor:pointer;background:#fff;color:var(--cobalt-dk)}
.btn-ghost:hover{border-color:var(--marigold)}
.turn-fb{font-size:.9rem;border-radius:10px;padding:8px 12px;text-align:right}
.turn-fb.ok{background:#EDF7EF;border:1px solid #BEE0C5;color:var(--jade)}
.turn-fb.almost{background:#FDF3E0;border:1px solid #F2DEBC;color:#9A6206}
.turn-fb.bad{background:#FBECE4;border:1px solid #F0CDBB;color:var(--terracotta)}
.turn-hint{font-size:.88rem;color:var(--muted);background:#FBF7EF;border:1px solid var(--line);border-radius:10px;
  padding:8px 12px;text-align:right}
.part-summary{align-self:center;background:#EDF7EF;border:1px solid #BEE0C5;border-radius:14px;padding:14px 18px;
  font-weight:600;color:var(--jade);text-align:center}
.line .grade{font-size:.8rem;margin-top:4px}
.line .grade.ok{color:var(--jade)}
.line .grade.almost{color:#9A6206}
.line .grade.bad{color:var(--terracotta)}
@media(max-width:520px){.hero h1{font-size:1.9rem}body{font-size:16px}.line{max-width:92%}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" href="index.html">← Inicio</a>
    <a class="back" id="back-to-picker" href="lecciones.html" style="display:none">← Todas las lecciones</a>
  </div>

  <div id="view-picker">
    <header class="hero">
      <div class="kicker">🌵 Lecciones</div>
      <h1>¿Qué situación quieres practicar?</h1>
      <p class="sub">Cada lección es una conversación real, con el vocabulario y la gramática que ya conoces, en contexto. Léela — o participa en ella.</p>
    </header>
    <div class="grid" id="lesson-grid"></div>
  </div>

  <div id="view-detail" style="display:none"></div>
</div>

<script src="spelling_handler.js"></script>
<script>
var LS_DICT='tapatio_dict_v', LS_LEITNER='tapatio_leitner';
var LESSONS = [];
var CUR=null;                      // current lesson
var MODE='leer';                   // 'leer' | 'participar'
var PART=null;                     // participar state
var LEER_SEL={};                   // leer-mode chosen options, per lesson: {nodeIdx:optIdx}

function $(id){return document.getElementById(id);}
function esc(s){return String(s).replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

// ── Mastery: reads existing dict + Leitner cache, no new storage ───────────
function masteryFor(words){
  var dict=null, overlay={};
  try{dict=JSON.parse(localStorage.getItem(LS_DICT)||'null');}catch(e){}
  try{overlay=JSON.parse(localStorage.getItem(LS_LEITNER)||'null')||{};}catch(e){}
  if(!dict||!dict.length) return null;
  var byWord={}; dict.forEach(function(e){byWord[e.word]=e;});
  var known=0, total=0;
  words.forEach(function(w){
    var e=byWord[w]; if(!e) return;
    total++;
    var box=(overlay[w]&&overlay[w].box)||e.leitner_box||1;
    if(box>=4) known++;
  });
  if(!total) return null;
  return {known:known, total:total};
}

// ── Picker (drill-type lessons live in verbos.html now) ───────────────────
function renderPicker(){
  var grid=$('lesson-grid');
  grid.innerHTML='';
  var convos=LESSONS.filter(function(l){return l.type!=='drill';});
  if(!convos.length){
    grid.outerHTML='<div class="empty-state">Todavía no hay lecciones cargadas. 🌱</div>';
    return;
  }
  convos.forEach(function(l){
    var card=document.createElement('a');
    card.className='lesson-card';
    card.href='lecciones.html#'+encodeURIComponent(l.id);
    var m=masteryFor((l.vocab_highlight||[]).map(function(v){return v.word;}));
    var chip = m ? '<div class="mastery-chip">🔥 '+m.known+'/'+m.total+' ya casi dominadas</div>' : '';
    card.innerHTML =
      '<div class="accent" style="background:'+l.accent+'"></div>'+
      '<div class="emoji">'+l.emoji+'</div>'+
      '<h3>'+esc(l.title)+'</h3>'+
      '<p>'+esc(l.summary)+'</p>'+
      chip+
      '<div class="go">Empezar <span>→</span></div>';
    grid.appendChild(card);
  });
}

// ── Detail ───────────────────────────────────────────────────────────────
function sideOf(lesson,speaker){ return speaker===lesson.player ? 'me' : 'them'; }

function bubbleHtml(lesson,d,extra){
  return '<div class="line '+sideOf(lesson,d.speaker)+'">'+
           '<div class="who">'+esc(d.speaker)+'</div>'+
           '<div class="es">'+esc(d.es)+'</div>'+
           '<div class="en">'+esc(d.en)+'</div>'+
           (extra||'')+
         '</div>';
}

function renderDetail(lesson){
  CUR=lesson; MODE='leer'; PART=null; LEER_SEL={};
  $('view-picker').style.display='none';
  $('back-to-picker').style.display='inline-flex';
  var v=$('view-detail');
  v.style.display='block';

  var chipsHtml = lesson.vocab_highlight.map(function(w){
    return '<span class="chip"><b>'+esc(w.word)+'</b> · <span class="en">'+esc(w.english)+'</span></span>';
  }).join('');

  var gramHtml = lesson.grammar_refs.map(function(g){
    return '<div class="gram-card"><div class="sec">grammar_catalog.md · Sección '+g.section+' — '+esc(g.title)+'</div><p>'+esc(g.note)+'</p></div>';
  }).join('');

  var practiceHtml = lesson.practice.map(function(p){
    return '<div class="practice-item"><div class="txt"><b>'+esc(p.label)+'</b><small>'+esc(p.note)+'</small></div>'+
           '<a class="btn-go" href="'+esc(p.href)+'">Abrir →</a></div>';
  }).join('');

  v.innerHTML =
    '<div class="card">'+
      '<div class="lesson-head">'+
        '<div class="emoji">'+lesson.emoji+'</div>'+
        '<div><h1>'+esc(lesson.title)+'</h1><div class="summary">'+esc(lesson.summary)+'</div></div>'+
      '</div>'+
      '<div class="note-box" style="margin-top:14px">'+esc(lesson.setting)+'</div>'+
    '</div>'+

    '<div class="card">'+
      '<h2>🗣️ Registro</h2>'+
      '<div class="note-box">'+esc(lesson.register_note)+'</div>'+
    '</div>'+

    '<div class="card">'+
      '<h2>💬 La conversación</h2>'+
      '<div class="mode-row">'+
        '<button class="mode-btn active" id="mode-leer" onclick="setMode(\'leer\')">📖 Leer</button>'+
        '<button class="mode-btn" id="mode-part" onclick="setMode(\'participar\')">🎭 Participar</button>'+
      '</div>'+
      '<div class="mode-hint" id="mode-hint"></div>'+
      '<div class="dialogue" id="dlg-host"></div>'+
    '</div>'+

    '<div class="card">'+
      '<h2>🃏 Vocabulario de esta lección</h2>'+
      '<div class="chips">'+chipsHtml+'</div>'+
    '</div>'+

    '<div class="card">'+
      '<h2>📚 Gramática en esta lección</h2>'+
      gramHtml+
    '</div>'+

    '<div class="card">'+
      '<h2>🎯 Practica este vocabulario</h2>'+
      '<div class="practice-list">'+practiceHtml+'</div>'+
    '</div>';

  renderDialogue();
}

function setMode(m){
  MODE=m;
  $('mode-leer').className='mode-btn'+(m==='leer'?' active':'');
  $('mode-part').className='mode-btn'+(m==='participar'?' active':'');
  if(m==='participar'){ PART={i:0,ok:0,tot:0}; }
  renderDialogue();
}

// ── LEER mode: full dialogue; choice points are tappable ─────────────────
function renderDialogue(){
  var hint=$('mode-hint');
  if(MODE==='leer'){
    hint.textContent='Lee la conversación completa. En los momentos de decisión, toca una opción para ver cómo sigue.';
    renderLeer();
  }else{
    hint.textContent='Ahora '+(CUR.player==='Stan'?'eres tú, Stan':'tú eres '+CUR.player)+': escribe tus líneas (la pista en inglés te dice qué decir) y elige tu camino. Acentos cuentan, pero con cariño.';
    renderPart();
  }
}

function renderLeer(){
  var L=CUR, host=$('dlg-host'), html='';
  L.dialogue.forEach(function(d,idx){
    if(d.choice){
      var sel=LEER_SEL[idx];
      if(sel===undefined){
        html+='<div class="choice-block"><div class="choice-title">'+esc(d.prompt||'¿Qué dices?')+'</div>';
        d.choice.forEach(function(opt,k){
          html+='<button class="choice-btn" onclick="leerChoose('+idx+','+k+')">'+esc(opt.es)+
                '<span class="en">'+esc(opt.en)+'</span></button>';
        });
        html+='</div>';
      }else{
        var opt=d.choice[sel];
        html+=bubbleHtml(L,{speaker:d.speaker,es:opt.es,en:opt.en});
        if(opt.note) html+='<div class="choice-note">💡 '+esc(opt.note)+'</div>';
        (opt.response||[]).forEach(function(r){ html+=bubbleHtml(L,r); });
        html+='<button class="rechoose" onclick="leerChoose('+idx+',undefined)">↺ Probar la otra opción</button>';
      }
    }else{
      html+=bubbleHtml(L,d);
    }
  });
  host.innerHTML=html;
}
function leerChoose(idx,k){
  if(k===undefined) delete LEER_SEL[idx]; else LEER_SEL[idx]=k;
  renderLeer();
}

// ── PARTICIPAR mode: progressive, type your lines, choose your path ──────
function normPhrase(s){
  return String(s).toLowerCase()
    .replace(/[¿?¡!.,;:…«»"“”‘’']/g,'')
    .replace(/\s+/g,' ').trim();
}
function renderPart(){
  var host=$('dlg-host');
  host.innerHTML='';
  PART=PART||{i:0,ok:0,tot:0};
  PART.html='';
  partAdvance();
}
function partAdvance(){
  var L=CUR, host=$('dlg-host');
  while(PART.i<L.dialogue.length){
    var d=L.dialogue[PART.i];
    var mine = d.speaker===L.player;
    if(!mine){ PART.html+=bubbleHtml(L,d); PART.i++; continue; }
    if(d.choice){ renderPartChoice(d); return; }
    renderPartTurn(d); return;
  }
  // done
  var msg = PART.tot
    ? '🎉 ¡Terminaste! '+PART.ok+' de '+PART.tot+' líneas bien a la primera.'
    : '🎉 ¡Terminaste la conversación!';
  PART.html+='<div class="part-summary">'+msg+
    '<div style="margin-top:8px"><button class="btn-ghost" onclick="setMode(\'participar\')">↺ Otra vez</button> '+
    '<button class="btn-ghost" onclick="setMode(\'leer\')">📖 Leerla completa</button></div></div>';
  host.innerHTML=PART.html;
}
function renderPartChoice(d){
  var host=$('dlg-host'), html=PART.html;
  html+='<div class="choice-block" id="part-turn"><div class="choice-title">'+esc(d.prompt||'¿Qué dices?')+'</div>';
  d.choice.forEach(function(opt,k){
    html+='<button class="choice-btn" onclick="partChoose('+k+')">'+esc(opt.es)+
          '<span class="en">'+esc(opt.en)+'</span></button>';
  });
  html+='</div>';
  host.innerHTML=html;
  scrollToTurn();
}
function partChoose(k){
  var L=CUR, d=L.dialogue[PART.i], opt=d.choice[k];
  PART.html+=bubbleHtml(L,{speaker:d.speaker,es:opt.es,en:opt.en});
  if(opt.note) PART.html+='<div class="choice-note">💡 '+esc(opt.note)+'</div>';
  (opt.response||[]).forEach(function(r){ PART.html+=bubbleHtml(L,r); });
  PART.i++;
  partAdvance();
}
function renderPartTurn(d){
  var host=$('dlg-host'), html=PART.html;
  html+='<div class="turn-block" id="part-turn">'+
    '<div class="turn-cue"><b>Tu turno.</b> Di: “'+esc(d.en)+'”</div>'+
    '<div class="turn-input-row">'+
      '<input class="turn-input" id="pt-input" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Escribe tu línea en español…">'+
      '<button class="btn-check" id="pt-check">Comprobar</button>'+
    '</div>'+
    '<div><button class="btn-ghost" id="pt-hint">🛟 Pista</button> '+
    '<button class="btn-ghost" id="pt-show">Mostrar línea</button></div>'+
    '<div id="pt-extra"></div>'+
  '</div>';
  host.innerHTML=html;
  PART.hintN=0; PART.tried=false;
  $('pt-check').onclick=partGrade;
  $('pt-hint').onclick=partHint;
  $('pt-show').onclick=function(){ partResolve('shown'); };
  var inp=$('pt-input');
  inp.onkeydown=function(ev){ if(ev.key==='Enter'){ev.preventDefault();partGrade();} };
  inp.focus();
  scrollToTurn();
}
function partHint(){
  var d=CUR.dialogue[PART.i];
  var words=d.es.split(' ');
  PART.hintN=Math.min(words.length,(PART.hintN||0)+2);
  var ex=$('pt-extra');
  ex.innerHTML='<div class="turn-hint">Empieza: “'+esc(words.slice(0,PART.hintN).join(' '))+(PART.hintN<words.length?' …':'')+'”</div>';
}
function partGrade(){
  var d=CUR.dialogue[PART.i], inp=$('pt-input');
  var given=(inp.value||'').trim();
  if(!given) return;
  var r=SpellingHandler.check(normPhrase(given), normPhrase(d.es));
  if(r.status==='exact'||r.status==='accent_only'){
    partResolve(PART.tried?'retry_ok':(r.status==='exact'?'ok':'almost'));
  }else if(r.status==='close'){
    PART.tried=true;
    $('pt-extra').innerHTML='<div class="turn-fb almost">😅 Casi casi — revisa y prueba otra vez, o pide una pista.</div>';
  }else{
    PART.tried=true;
    $('pt-extra').innerHTML='<div class="turn-fb bad">Mmm, esa no es la línea. Otra vez, o toca 🛟 Pista.</div>';
  }
}
function partResolve(how){
  var L=CUR, d=L.dialogue[PART.i];
  PART.tot++;
  var grade='';
  if(how==='ok'){ PART.ok++; grade='<div class="grade ok">✅ ¡A la primera!</div>'; }
  else if(how==='almost'){ PART.ok++; grade='<div class="grade almost">✏️ Bien — solo cuida los acentos.</div>'; }
  else if(how==='retry_ok'){ grade='<div class="grade almost">💪 ¡Salió al segundo intento!</div>'; }
  else { grade='<div class="grade bad">👀 Línea mostrada — la vemos otra vez al final.</div>'; }
  PART.html+=bubbleHtml(L,d,grade);
  PART.i++;
  partAdvance();
}
function scrollToTurn(){
  var t=$('part-turn');
  if(t) setTimeout(function(){ t.scrollIntoView({behavior:'smooth',block:'center'}); },60);
}

// ── Routing ──────────────────────────────────────────────────────────────
function route(){
  var id = decodeURIComponent((location.hash||'').replace('#',''));
  if(!id){
    CUR=null; PART=null;
    $('view-detail').style.display='none';
    $('back-to-picker').style.display='none';
    $('view-picker').style.display='block';
    renderPicker();
    return;
  }
  var lesson = LESSONS.filter(function(l){return l.id===id;})[0];
  if(!lesson){
    location.hash='';
    return;
  }
  if(lesson.type==='drill'){            // Los 100 Verbos moved to its own page
    location.replace('verbos.html');
    return;
  }
  renderDetail(lesson);
}

window.addEventListener('hashchange', route);

fetch('lessons.json',{cache:'no-store'})
  .then(function(r){return r.json();})
  .then(function(data){
    LESSONS = data.lessons||[];
    route();
  })
  .catch(function(){
    $('lesson-grid').outerHTML='<div class="empty-state">No se pudo cargar lessons.json. ¿Está en la misma carpeta?</div>';
  });
</script>
</body>
</html>
