<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor de Español Tapatío · Guadalajara</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cobalt:#1B4F8A;--cobalt-dk:#143a66;--terracotta:#C1440E;--marigold:#E8971A;
  --cream:#F5F0E8;--jade:#2A7A3B;--muted:#6B7280;--text:#1A1A2E;--bg:#F5F0E8;--tapatio:#7C3AED;
  --card:#FFFFFF;--line:#E2D8C8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',system-ui,sans-serif;color:var(--text);min-height:100vh;
  background:
   radial-gradient(circle at 10% 0%, rgba(232,151,26,.12), transparent 40%),
   radial-gradient(circle at 90% 100%, rgba(27,79,138,.12), transparent 44%),
   var(--bg);}
.wrap{max-width:880px;margin:0 auto;padding:40px 20px 72px}
header.hero{text-align:center;margin-bottom:34px}
.hero .kicker{font-family:'Barlow Condensed',sans-serif;letter-spacing:.18em;text-transform:uppercase;
  color:var(--terracotta);font-weight:700;font-size:.9rem}
.hero h1{font-family:'Playfair Display',serif;font-size:2.6rem;color:var(--cobalt);line-height:1.08;margin-top:6px}
.hero .sub{color:var(--muted);font-size:1.02rem;margin-top:10px;max-width:560px;margin-left:auto;margin-right:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
.app-card{display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);
  border-radius:18px;padding:22px;text-decoration:none;color:inherit;position:relative;overflow:hidden;
  box-shadow:0 8px 22px rgba(27,79,138,.06);transition:transform .16s, box-shadow .16s, border-color .16s}
.app-card:hover{transform:translateY(-4px);box-shadow:0 14px 30px rgba(27,79,138,.14);border-color:var(--marigold)}
.app-card.soon{opacity:.62;pointer-events:none}
.app-card .accent{position:absolute;top:0;left:0;right:0;height:5px}
.app-card .emoji{font-size:2.4rem;line-height:1}
.app-card h3{font-family:'Oswald',sans-serif;font-size:1.22rem;color:var(--cobalt-dk);margin:12px 0 4px}
.app-card p{color:var(--muted);font-size:.92rem;flex:1}
.app-card .go{margin-top:16px;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;
  letter-spacing:.04em;font-size:.84rem;color:var(--terracotta);display:flex;align-items:center;gap:6px}
.app-card.soon .go{color:var(--muted)}
.badge{position:absolute;top:16px;right:16px;font-size:.68rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;padding:3px 9px;border-radius:20px}
.badge.tapatio{background:#F3EEFE;color:var(--tapatio);border:1px solid #E2D2FB}
.badge.soon{background:#FBF1E2;color:var(--amber);border:1px solid #F2DEBC}
footer{text-align:center;margin-top:40px;color:var(--muted);font-size:.84rem}
footer .chili{font-size:1rem}
@media(max-width:520px){.hero h1{font-size:2rem}}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="kicker">🌵 Tutor Tapatío · Guadalajara, Jalisco</div>
    <h1>Tu Estudio de Español</h1>
    <p class="sub">Una colección de herramientas para reforzar tu español tapatío — vocabulario, gramática y oraciones, todo conectado a tu progreso Leitner.</p>
  </header>

  <main class="grid" id="app-grid"></main>

  <footer>
    Hecho con <span class="chili">🌶️</span> en Guadalajara · clases con Aura y Lalo ·
    progreso guardado en tu navegador.
  </footer>
</div>

<script>
// ── App registry — add a new entry here and it appears on the launcher ──────
var APPS = [
  {
    title: 'Tarjetas de Vocabulario',
    emoji: '🃏',
    desc: 'Repaso con tarjetas Leitner. Modos Clic y Escribir, por categoría, con sabor tapatío.',
    href: 'flashcards_vocabulario.html',
    accent: '#1B4F8A',
    badge: { kind: 'tapatio', label: 'Leitner' }
  },
  {
    title: 'Constructor de Oraciones',
    emoji: '🧩',
    desc: 'Oraciones dinámicas para rellenar — verbos, pronombres y concordancia. Nunca se repiten. Refuerza lo que menos dominas.',
    href: 'sentence_maker.html',
    accent: '#C1440E',
    badge: { kind: 'tapatio', label: 'Nuevo' }
  },
  {
    title: 'Editor del Diccionario',
    emoji: '📖',
    desc: 'Agrega y edita palabras, gestiona conjugaciones y controla las cajas Leitner.',
    href: 'dictionary_editor.html',
    accent: '#2A7A3B',
    badge: null
  }
  // Future apps drop in here, e.g.:
  // { title:'Drills de Conjugación', emoji:'⚡', desc:'...', href:'conjugation_drills.html', accent:'#E8971A', badge:{kind:'soon',label:'Pronto'}, soon:true }
];

(function () {
  var grid = document.getElementById('app-grid');
  APPS.forEach(function (a) {
    var card = document.createElement(a.soon ? 'div' : 'a');
    card.className = 'app-card' + (a.soon ? ' soon' : '');
    if (!a.soon) card.href = a.href;
    var html = '<div class="accent" style="background:' + a.accent + '"></div>';
    if (a.badge) html += '<span class="badge ' + a.badge.kind + '">' + a.badge.label + '</span>';
    html += '<div class="emoji">' + a.emoji + '</div>';
    html += '<h3>' + a.title + '</h3>';
    html += '<p>' + a.desc + '</p>';
    html += '<div class="go">' + (a.soon ? 'Próximamente' : 'Abrir') + ' <span>→</span></div>';
    card.innerHTML = html;
    grid.appendChild(card);
  });
})();
</script>
</body>
</html>
